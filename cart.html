<button onclick="window.location.href='cart.html'" class="active:opacity-70 transition-opacity text-secondary relative">

<span class="cart-badge absolute -top-1 -right-1 bg-secondary text-on-secondary text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold" style="display:none">0</span>

<main class="mt-20 px-container-margin max-w-md mx-auto">
<div class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Order Summary</h2>
<p class="font-label-caps text-label-caps text-on-surface-variant mt-2 uppercase tracking-[0.2em]">Your Cart • Elite Diner</p>

<!-- Dynamic Cart Items -->

</div>

<!-- Empty State -->
<div id="empty-cart" class="hidden text-center py-16">
    <span class="material-symbols-outlined text-[64px] text-outline-variant mb-4">shopping_cart</span>
    <h3 class="font-title-md text-title-md text-on-surface-variant mb-2">Your cart is empty</h3>
    <p class="font-body-md text-on-tertiary-container mb-6">Browse our curated menu and add your favourites.</p>
    <button onclick="window.location.href='menucategory.html'" class="border border-secondary text-secondary font-label-caps text-label-caps py-3 px-8 rounded-lg hover:bg-secondary hover:text-on-secondary transition-all duration-300">
        EXPLORE MENU
    </button>
</div>

<!-- Order Breakdown -->
<section id="order-breakdown" class="bg-surface-container-high/40 rounded-xl p-6 mb-stack-lg border border-outline-variant/10">
<div class="space-y-4">
<div class="flex items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">SUBTOTAL</span>
<div class="dotted-leader"></div>
<span id="subtotal" class="font-body-lg text-on-surface">₹0</span>
</div>
<div class="flex items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">GST (5%)</span>
<div class="dotted-leader"></div>
<span id="gst" class="font-body-lg text-on-surface">₹0</span>
</div>
<div class="pt-4 mt-4 border-t border-outline-variant/30 flex items-center justify-between">
<span class="font-display-lg text-headline-lg-mobile text-on-surface">Total</span>
<span id="grand-total" class="font-display-lg text-headline-lg-mobile text-secondary">₹0</span>
</div>
</div>

<script src="cart.js"></script>
<script>
function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cart-items');
    const emptyState = document.getElementById('empty-cart');
    const breakdown = document.getElementById('order-breakdown');
    const orderBtn = document.getElementById('order-btn');
    const clearBtn = document.getElementById('clear-btn');

    if (cart.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        breakdown.classList.add('hidden');
        orderBtn.classList.add('hidden');
        clearBtn.classList.add('hidden');
        return;
    }

    emptyState.classList.add('hidden');
    breakdown.classList.remove('hidden');
    orderBtn.classList.remove('hidden');
    clearBtn.classList.remove('hidden');

    let html = '';
    cart.forEach(item => {
        html += `
        <div class="flex items-start gap-4 p-4 rounded-xl bg-surface-container-low border border-outline-variant/20">
            <div class="w-12 h-12 rounded-lg bg-secondary/10 flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-secondary">restaurant</span>
            </div>
            <div class="flex-grow">
                <div class="flex justify-between items-start">
                    <h3 class="font-title-md text-body-lg text-secondary leading-tight">${item.name}</h3>
                    <button onclick="deleteItem('${item.name.replace(/'/g, "\\'")}')" class="text-on-surface-variant hover:text-error transition-colors">
                        <span class="material-symbols-outlined text-[20px]">delete</span>
                    </button>
                </div>
                <div class="flex items-center justify-between mt-3">
                    <div class="flex items-center gap-3 bg-surface-container-highest rounded-full px-2 py-1 border border-outline-variant/10">
                        <button onclick="updateQty('${item.name.replace(/'/g, "\\'")}', -1)" class="w-6 h-6 flex items-center justify-center text-secondary active:scale-90 transition-transform">
                            <span class="material-symbols-outlined text-[18px]">remove</span>
                        </button>
                        <span class="font-bold text-on-surface w-4 text-center">${item.qty}</span>
                        <button onclick="updateQty('${item.name.replace(/'/g, "\\'")}', 1)" class="w-6 h-6 flex items-center justify-center text-secondary active:scale-90 transition-transform">
                            <span class="material-symbols-outlined text-[18px]">add</span>
                        </button>
                    </div>
                    <span class="font-title-md text-secondary">₹${item.price * item.qty}</span>
                </div>
            </div>
        </div>`;
    });
    container.innerHTML = html;

    // Totals
    const subtotal = getCartTotal();
    const gst = Math.round(subtotal * 0.05);
    const grandTotal = subtotal + gst;

    document.getElementById('subtotal').textContent = '₹' + subtotal;
    document.getElementById('gst').textContent = '₹' + gst;
    document.getElementById('grand-total').textContent = '₹' + grandTotal;

    updateCartBadge();
}

function deleteItem(name) {
    removeFromCart(name);
    renderCart();
}

function updateQty(name, delta) {
    changeQty(name, delta);
    renderCart();
}

function clearCartAndRefresh() {
    clearCart();
    renderCart();
}

// Initial render
renderCart();
</script>
</body></html>
