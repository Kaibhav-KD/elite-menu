<body class="bg-background text-on-background font-body-md selection:bg-secondary/30">

</button>
<span class="font-display-lg text-title-md tracking-widest text-secondary">ELITE DINER</span>

</header>
<!-- Main Reservation Canvas -->
<main class="relative z-10 flex-grow px-container-margin pt-24 pb-stack-lg max-w-md mx-auto w-full">
<!-- Headline Section -->
<section class="mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Secure Your Table</h1>
<p class="font-body-md text-on-surface-variant">Experience the pinnacle of dining at Cafe Elite.</p>
</section>
<form class="space-y-stack-lg">
<!-- Date Selection Section -->
<section>
<div class="flex justify-between items-center mb-4">
<label class="font-label-caps text-label-caps text-secondary uppercase">Select Date</label>
<span id="month-display" class="text-on-tertiary-container text-xs font-body-md">October 2024</span>
</div>
<div class="flex overflow-x-auto gap-4 pb-2 hide-scrollbar snap-x">
<!-- Date Cards -->
<div class="flex-shrink-0 snap-start">
<input checked="" class="hidden peer" id="date-1" name="date" type="radio"/>
<label class="flex flex-col items-center justify-center w-16 h-20 rounded-lg border border-outline-variant/50 bg-surface-container-low transition-all peer-checked:bg-secondary-container peer-checked:border-secondary peer-checked:text-on-secondary" for="date-1">
<span class="text-xs uppercase font-label-caps opacity-70">Fri</span>
<span class="text-xl font-bold font-title-md">18</span>
</label>
</div>
<div class="flex-shrink-0 snap-start">
<input class="hidden peer" id="date-2" name="date" type="radio"/>
<label class="flex flex-col items-center justify-center w-16 h-20 rounded-lg border border-outline-variant/50 bg-surface-container-low transition-all peer-checked:bg-secondary-container peer-checked:border-secondary peer-checked:text-on-secondary" for="date-2">
<span class="text-xs uppercase font-label-caps opacity-70">Sat</span>
<span class="text-xl font-bold font-title-md">19</span>
</label>
</div>
<div class="flex-shrink-0 snap-start">
<input class="hidden peer" id="date-3" name="date" type="radio"/>
<label class="flex flex-col items-center justify-center w-16 h-20 rounded-lg border border-outline-variant/50 bg-surface-container-low transition-all peer-checked:bg-secondary-container peer-checked:border-secondary peer-checked:text-on-secondary" for="date-3">
<span class="text-xs uppercase font-label-caps opacity-70">Sun</span>
<span class="text-xl font-bold font-title-md">20</span>
</label>
</div>
<div class="flex-shrink-0 snap-start">
<input class="hidden peer" id="date-4" name="date" type="radio"/>
<label class="flex flex-col items-center justify-center w-16 h-20 rounded-lg border border-outline-variant/50 bg-surface-container-low transition-all peer-checked:bg-secondary-container peer-checked:border-secondary peer-checked:text-on-secondary" for="date-4">
<span class="text-xs uppercase font-label-caps opacity-70">Mon</span>
<span class="text-xl font-bold font-title-md">21</span>
</label>
</div>
<div class="flex-shrink-0 snap-start">
<input class="hidden peer" id="date-5" name="date" type="radio"/>
<label class="flex flex-col items-center justify-center w-16 h-20 rounded-lg border border-outline-variant/50 bg-surface-container-low transition-all peer-checked:bg-secondary-container peer-checked:border-secondary peer-checked:text-on-secondary" for="date-5">
<span class="text-xs uppercase font-label-caps opacity-70">Tue</span>
<span class="text-xl font-bold font-title-md">22</span>
</label>
</div>
</div>
</section>
<!-- Guest Count Section -->
<section>
<label class="font-label-caps text-label-caps text-secondary uppercase block mb-4">Guest Count</label>
<div class="flex items-center justify-between p-4 bg-surface-container-high rounded-xl border border-outline-variant/20">
<button class="w-12 h-12 flex items-center justify-center rounded-full border border-secondary text-secondary transition-colors active:bg-secondary active:text-on-secondary" onclick="decrementGuest()" type="button">
<span class="material-symbols-outlined">remove</span>
</button>

<span class="text-3xl font-title-md text-on-surface" id="guest-count">2</span>

</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full border border-secondary text-secondary transition-colors active:bg-secondary active:text-on-secondary" onclick="incrementGuest()" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Time Selection Section -->
<section>
<label class="font-label-caps text-label-caps text-secondary uppercase block mb-4">Available Times</label>
<div class="grid grid-cols-3 gap-3">

<label class="py-3 flex items-center justify-center rounded-lg border border-outline-variant/30 bg-surface-container-low text-on-surface transition-all peer-checked:border-secondary peer-checked:text-secondary peer-checked:bg-secondary/10" for="time-1">6:00 PM</label>
<input checked="" class="hidden peer" id="time-2" name="time" type="radio"/>
<label class="py-3 flex items-center justify-center rounded-lg border border-outline-variant/30 bg-surface-container-low text-on-surface transition-all peer-checked:border-secondary peer-checked:text-secondary peer-checked:bg-secondary/10" for="time-2">6:30 PM</label>
<input class="hidden peer" id="time-3" name="time" type="radio"/>
<label class="py-3 flex items-center justify-center rounded-lg border border-outline-variant/30 bg-surface-container-low text-on-surface transition-all peer-checked:border-secondary peer-checked:text-secondary peer-checked:bg-secondary/10" for="time-3">7:00 PM</label>
<input class="hidden peer" id="time-4" name="time" type="radio"/>
<label class="py-3 flex items-center justify-center rounded-lg border border-outline-variant/30 bg-surface-container-low text-on-surface transition-all peer-checked:border-secondary peer-checked:text-secondary peer-checked:bg-secondary/10" for="time-4">7:30 PM</label>
<input class="hidden peer" id="time-5" name="time" type="radio"/>
<label class="py-3 flex items-center justify-center rounded-lg border border-outline-variant/30 bg-surface-container-low text-on-surface transition-all peer-checked:border-secondary peer-checked:text-secondary peer-checked:bg-secondary/10" for="time-5">8:00 PM</label>
<input class="hidden peer" id="time-6" name="time" type="radio"/>
<label class="py-3 flex items-center justify-center rounded-lg border border-outline-variant/30 bg-surface-container-low text-on-surface transition-all peer-checked:border-secondary peer-checked:text-secondary peer-checked:bg-secondary/10" for="time-6">8:30 PM</label>
</div>
</section>
<!-- Additional Info (Elite Detail) -->
<section class="pt-4">
<div class="p-4 bg-secondary/5 border border-secondary/20 rounded-xl flex gap-4">
<span class="material-symbols-outlined text-secondary shrink-0">info</span>
<p class="text-xs font-body-md text-on-tertiary-container italic">
                            Your Presence is requested to maintain our dining atmosphere. Tables are held for 15 minutes past reservation time.
                        </p>
</div>

</main>
<!-- Footer Action (Sticky) -->
<footer class="fixed bottom-0 w-full z-50 bg-surface-container/95 backdrop-blur-md border-t border-outline-variant/10 px-container-margin py-6 max-w-md mx-auto left-0 right-0">
<button onclick="confirmReservation()" class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps py-4 rounded-xl shadow-lg transition-transform active:scale-95 hover:bg-secondary-fixed duration-200">
                CONFIRM RESERVATION
            </button>
</footer>
</div>
<script>
        let count = 2;
        const guestDisplay = document.getElementById('guest-count');

        function incrementGuest() {
            if(count < 12) {
                count++;
                guestDisplay.innerText = count;
                animateValue(guestDisplay);
            }
        }

        function decrementGuest() {
            if(count > 1) {
                count--;
                guestDisplay.innerText = count;
                animateValue(guestDisplay);
            }
        }

        function animateValue(el) {
            el.classList.add('scale-110');
            setTimeout(() => el.classList.remove('scale-110'), 150);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const monthDisplay = document.getElementById('month-display');
            if (monthDisplay) {
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + 2);
                
                const optionsMonthYear = { month: 'long', year: 'numeric' };
                monthDisplay.textContent = targetDate.toLocaleDateString('en-US', optionsMonthYear);
                
                const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                let currentLoopDate = new Date(targetDate);
                
                for (let i = 1; i <= 5; i++) {
                    const label = document.querySelector(`label[for="date-${i}"]`);
                    if (label) {
                        const spans = label.querySelectorAll('span');
                        if (spans.length >= 2) {
                            spans[0].textContent = dayNames[currentLoopDate.getDay()];
                            spans[1].textContent = currentLoopDate.getDate();
                        }
                    }
                    currentLoopDate.setDate(currentLoopDate.getDate() + 1);
                }
            }
        });

        function confirmReservation() {
            const guests = document.getElementById('guest-count').innerText;

            const selectedDateInput = document.querySelector('input[name="date"]:checked');
            let fullDate = "Unknown Date";
            if (selectedDateInput) {
                const dateLabel = document.querySelector(`label[for="${selectedDateInput.id}"]`);
                const dateSpans = dateLabel.querySelectorAll('span');
                const monthYear = document.getElementById('month-display') ? document.getElementById('month-display').innerText : '';
                if (dateSpans.length >= 2) {
                    fullDate = `${dateSpans[0].innerText}, ${dateSpans[1].innerText} ${monthYear}`;
                }
            }

            const selectedTimeInput = document.querySelector('input[name="time"]:checked');
            let selectedTime = "Unknown Time";
            if (selectedTimeInput) {
                const timeLabel = document.querySelector(`label[for="${selectedTimeInput.id}"]`);
                if (timeLabel) {
                    selectedTime = timeLabel.innerText;
                }
            }

            const message = `Hello Elite Diner,\nI would like to book a table.\n*Details:*\n📅 Date: ${fullDate}\n⏰ Time: ${selectedTime}\n👥 Guests: ${guests}\n\nPlease confirm my reservation.`;

            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/919548907207?text=${encodedMessage}`, '_blank');
        }
    </script>
